<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Silver Wolf VI — A cyberpunk AI assistant interface powered by Gemini. Chat with an AI companion in a stunning holographic terminal." />
    <meta name="theme-color" content="#0a0b10" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:title" content="Silver Wolf VI" />
    <meta property="og:description" content="Cyberpunk AI assistant interface powered by Gemini" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Silver Wolf VI</title>
    <style>
      /* Critical inline styles for instant loading feedback */
      body { margin: 0; background: #0a0b10; overflow: hidden; }
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: #0a0b10;
        gap: 12px;
      }
      #root-loader .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #8A5BC7;
        animation: loader-pulse 1.2s ease-in-out infinite;
      }
      #root-loader .dot:nth-child(2) { animation-delay: 0.15s; }
      #root-loader .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes loader-pulse {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader" aria-label="Loading Silver Wolf VI">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
